<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heavy - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navdiv">
            <div class="logo"><a>HEAVY</a></div>
        </div>
    </nav>
    <div class="header_line"></div>
    <div class="content">
        <div class="login">
            <div class="login_options">
                <h1>Log In</h1>
                <br>
                <button class="login_button">
                    <img src="https://cdn-icons-png.flaticon.com/512/0/747.png" class="google_logo">
                    <p class="box_text">Login with Google</p>
                </button>
                <br>
                <button class="login_button">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/500px-Google_%22G%22_logo.svg.png" class="google_logo">
                    <p class="box_text">Login with Apple</p>
                </button>
                <br>
                <div class="email_alternative">
                    <div class="line_email_alternative"></div>
                    <p style="color: #82888e">Or with email</p>
                    <div class="line_email_alternative"></div>
                </div>
                <p style="text-align: left">Email or username</p>
                <input type="text" class="input_box">
                <p style="text-align: left">Password</p>
                <input type="text" class="input_box">
                <br>
                <button class="login_button" style="background-color: #adb2b6">
                    <p style="color: white">Login</p>
                </button>
                <br>
                <a href="#">Forgot Password</a>
                <p>New to Heavy? <a href="register">Sign Up</a></p>
            </div>
        </div>
        <div class="login_screen_img_div">
            <img class="login_screen_img" src="https://imgs.search.brave.com/QN5wtiD4Me4ivErMLjH5RgwoDc0Kr2bi7gjkWalMW1M/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9zdGF0/aWMudmVjdGVlenku/Y29tL3N5c3RlbS9y/ZXNvdXJjZXMvdGh1/bWJuYWlscy8wNDIv/NTcxLzQxMC9zbWFs/bC9haS1nZW5lcmF0/ZWQtaW50ZW5zZS1n/eW0tdHJhaW5pbmct/c2Vzc2lvbi1mb2N1/c2VkLWF0aGxldGUt/cGVyZm9ybWluZy1k/ZWFkbGlmdHMtYW1p/ZHN0LWRyYW1hdGlj/LXJlZC1zbW9rZS1w/aG90by5qcGc" alt="Deadlift, login page">
        </div>
    </div>

        <br><br><br><br><br><br><br><br>
